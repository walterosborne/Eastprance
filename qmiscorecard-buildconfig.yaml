kind: BuildConfig
apiVersion: build.openshift.io/v1
metadata:
  name: qmiscorecard
  namespace: qmi-scorecard-dev
  labels:
    app: qmiscorecard
    app.kubernetes.io/component: qmiscorecard
    app.kubernetes.io/instance: qmiscorecard
    app.kubernetes.io/name: qmiscorecard
    app.openshift.io/runtime: nodejs
    app.openshift.io/runtime-version: 20-ubi9

spec:
  output:
    to:
      kind: DockerImage
      name: docker-ng-staging.northgrum.com/wosborne/qmiscorecard:latest

  successfulBuildsHistoryLimit: 5
  failedBuildsHistoryLimit: 5

  resources:
    limits:
      cpu: 250m
      memory: 1Gi
    requests:
      cpu: 100m
      memory: 512Mi

  strategy:
    type: Docker
    dockerStrategy:
      buildArgs:
        - name: BASE_IMAGE
          value: registry.access.redhat.com/ubi9/nodejs-20:latest

  source:
    type: Git
    git:
      uri: ""
      ref: main
    contextDir: /
    # This build expects a complete Dockerfile in the repo root at build time.
    # If the repo is private, add a sourceSecret here.

  triggers:
    - type: ConfigChange

  runPolicy: Serial
